# =============================================================
#  WhatsApp Chatbot - Application Configuration
# =============================================================

# Server port (default is 8080; change if there is a port conflict)
server.port=${PORT:8080}

# Application name (shown in logs and Spring Boot Actuator)
spring.application.name=whatsapp-chatbot

# =============================================================
#  Logging Configuration (SLF4J + Logback)
# =============================================================

# Root log level: WARN means only warnings and errors show by default.
logging.level.root=WARN

# Our application package: INFO shows the timestamped messages we log.
logging.level.com.chatbot.whatsappbot=INFO

# Pattern used by the console appender.
# Includes: date/time, log level, thread, logger name, and the message.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- Optional: Write logs to a file ---
# Uncomment the two lines below to also save logs to a file.
# logging.file.name=logs/chatbot.log
# logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
